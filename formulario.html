<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/icono-form.png">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/custom.css">
    <script src="js/bootstrap.bundle.js"></script>
    <script defer src="js/custom.js"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand ff-gen bg-secondary p-1">
            <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <p class="titulo nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown">
                            FORMULARIO
                        </p>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="index.html">Curriculum</a></li>
                            <li><a id="full-screen" onclick="pantallaCompleta(document.documentElement);" class="dropdown-item">Pantalla completa</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    
    <div class="container-fluid">
        <h1 class="text-center">CONTACTO <span class="icon-user"></span></h1>
        <form class="formulario" name="formulario" id="formulario" onsubmit="validacion()">
            <div class="form-group">
              <label for="dato">NOMBRE:</label>
              <input type="text" class="form-control" id="nombre" pattern="^[a-zA-Z]*"required>
            </div>
            <div class="form-group">
              <label for="dato">TELÉFONO:</label>
              <input type="tel" class="form-control" id="tlf" pattern="^[0-9]*$" required>
            </div>
            <div class="form-group">
                <label for="dato">EMAIL:</label>
                <input type="email" class="form-control" id="mail" required>
            </div>
            <div class="form-group">
                <label for="exampleFormControlTextarea1">MOTIVO DEL CONTACTO:</label>
                <textarea class="form-control" id="contacto" rows="3" onkeydown="queja()"></textarea>
            </div>
            <button type="submit" class="enviar">Enviar</button>
          </form>
    </div>
    <script type="text/javascript">
        //NO CLICK DERECHO
        document.oncontextmenu = function () {
            return false
        }
    </script>
</body>

</html>
