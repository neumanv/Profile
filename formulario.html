<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<body>
    <header>
        <nav class="navbar navbar-expand ff-gen bg-secondary p-1">
            <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">

                    </li>

    </header>
    <div class="container-fluid text-center">
        <h1>CONTACTO <span class="icon-user"></span></h1>
        <form onsubmit="validacion()">
            <div class="user-box">
                <p class="dato">NOMBRE: </p>
                <input type="text" required pattern="^[a-zA-Z]*$" id="nombre" required>
            </div>
            <div class="user-box">
                <p class="dato">TELÉFONO: </p>
                <input type="text" required pattern="^[0-9]*$" id="tlf" required>
            </div>
            <div class="user-box">
                <p class="dato">MAIL: </p>
                <input type="email" id="mail" required>
            </div>
            <div class="user-box">
                <p class="dato">MOTIVO DEL CONTACTO:</p>
                <textarea class="feedback-input" id="motivo" required></textarea>
            </div>
            <input type="submit" class="enviar" value="Enviar" id="btn-enviar" /></td>
        </form>
    </div>
    <script type="text/javascript">
        //NO CLICK DERECHO
        document.oncontextmenu = function () {
            return false
        }
    </script>
</body>
